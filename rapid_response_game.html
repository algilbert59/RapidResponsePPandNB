<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapid Response — Postpartum & Newborn Care</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-50: #E6F1FB; --blue-200: #85B7EB; --blue-600: #185FA5; --blue-800: #0C447C; --blue-900: #042C53;
    --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
    --amber-50: #FAEEDA; --amber-600: #BA7517; --amber-800: #633806;
    --coral-50: #FAECE7; --coral-600: #993C1D; --coral-800: #711B13;
    --green-50: #EAF3DE; --green-600: #3B6D11; --green-800: #27500A;
    --red-50: #FCEBEB; --red-600: #A32D2D; --red-800: #791F1F;
    --purple-50: #EEEDFE; --purple-600: #534AB7; --purple-800: #3C3489;
    --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-400: #888780; --gray-600: #5F5E5A;
    --font-main: 'DM Sans', sans-serif;
    --font-display: 'DM Serif Display', serif;
    --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
  }

  body {
    font-family: var(--font-main);
    background: #f5f3ee;
    color: #1a1a18;
    min-height: 100vh;
    padding: 0;
  }

  .app {
    max-width: 780px;
    margin: 0 auto;
    padding: 2rem 1.25rem 3rem;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ── Header ── */
  .game-header { margin-bottom: 2rem; }
  .game-header h1 { font-family: var(--font-display); font-size: 2.2rem; font-weight: 400; color: #1a1a18; line-height: 1.1; }
  .game-header p { font-size: 14px; color: var(--gray-600); margin-top: 4px; }

  /* ── Cards ── */
  .card {
    background: #fff;
    border: 1px solid #e0ddd5;
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .card-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gray-400); margin-bottom: 1rem; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; font-size: 14px; font-weight: 500;
    font-family: var(--font-main);
    border: 1px solid #ccc; border-radius: var(--radius-sm);
    background: #fff; color: #1a1a18; cursor: pointer;
    transition: background 0.12s, transform 0.08s;
  }
  .btn:hover { background: var(--gray-50); }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--blue-600); color: #fff; border-color: var(--blue-600); }
  .btn-primary:hover { background: var(--blue-800); border-color: var(--blue-800); }
  .btn-success { background: var(--green-600); color: #fff; border-color: var(--green-600); }
  .btn-success:hover { background: var(--green-800); }
  .btn-danger { background: var(--red-600); color: #fff; border-color: var(--red-600); }
  .btn-sm { padding: 6px 13px; font-size: 13px; }
  .btn-lg { padding: 12px 28px; font-size: 16px; }
  .btn-ghost { border: none; background: transparent; color: var(--gray-600); }
  .btn-ghost:hover { background: var(--gray-50); color: #1a1a18; }

  /* ── Setup ── */
  .setup-grid { display: grid; gap: 1.5rem; }
  .setup-label { font-size: 13px; font-weight: 600; color: var(--gray-600); margin-bottom: 8px; }
  .team-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .team-row .team-num { font-size: 13px; color: var(--gray-400); min-width: 52px; }
  .team-row input {
    flex: 1; padding: 8px 12px; font-size: 14px; font-family: var(--font-main);
    border: 1px solid #ddd; border-radius: var(--radius-sm);
    background: #fafaf8; color: #1a1a18;
  }
  .team-row input:focus { outline: 2px solid var(--blue-200); border-color: var(--blue-600); }

  .cat-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .cat-tag {
    padding: 5px 12px; font-size: 12px; font-weight: 500;
    border-radius: 99px; cursor: pointer; border: 1px solid transparent;
    transition: all 0.12s;
  }
  .cat-tag.on { background: var(--blue-50); color: var(--blue-800); border-color: var(--blue-200); }
  .cat-tag.off { background: var(--gray-50); color: var(--gray-400); border-color: var(--gray-100); }

  .mode-option { display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px; border: 1px solid #ddd; border-radius: var(--radius-md); margin-bottom: 8px; cursor: pointer; transition: border-color 0.12s; }
  .mode-option:hover { border-color: var(--blue-200); }
  .mode-option.selected { border-color: var(--blue-600); background: var(--blue-50); }
  .mode-option input { margin-top: 2px; }
  .mode-title { font-size: 14px; font-weight: 500; }
  .mode-desc { font-size: 12px; color: var(--gray-600); margin-top: 2px; }

  .q-num-wrap { display: flex; align-items: center; gap: 10px; }
  .q-num-wrap input[type=number] {
    width: 70px; padding: 7px 10px; font-size: 14px; font-family: var(--font-main);
    border: 1px solid #ddd; border-radius: var(--radius-sm); background: #fafaf8;
  }
  .shuffle-label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--gray-600); cursor: pointer; }

  /* ── Scoreboard ── */
  .scoreboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .team-tile {
    background: #fff; border: 1px solid #e0ddd5; border-radius: var(--radius-md);
    padding: 14px 12px; text-align: center; transition: border-color 0.2s, background 0.2s;
  }
  .team-tile.buzzing { border: 2px solid var(--blue-600); background: var(--blue-50); }
  .team-tile.correct-flash { border: 2px solid var(--green-600); background: var(--green-50); }
  .team-tile.wrong-flash { border: 2px solid var(--red-600); background: var(--red-50); }
  .tile-name { font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tile-score { font-family: var(--font-display); font-size: 32px; color: #1a1a18; line-height: 1; }
  .tile-turn { font-size: 11px; color: var(--blue-600); margin-top: 3px; font-weight: 500; }

  /* ── Progress ── */
  .progress-wrap { background: #e8e5de; border-radius: 99px; height: 5px; margin-bottom: 1.25rem; }
  .progress-fill { height: 5px; border-radius: 99px; background: var(--blue-600); transition: width 0.4s ease; }

  /* ── Question ── */
  .q-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
  .badge {
    display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 9px;
    border-radius: 99px; letter-spacing: 0.03em;
  }
  .badge-teal { background: var(--teal-50); color: var(--teal-800); }
  .badge-amber { background: var(--amber-50); color: var(--amber-800); }
  .badge-coral { background: var(--coral-50); color: var(--coral-800); }
  .badge-purple { background: var(--purple-50); color: var(--purple-800); }
  .badge-blue { background: var(--blue-50); color: var(--blue-800); }

  .q-text { font-size: 17px; font-weight: 500; line-height: 1.55; color: #1a1a18; margin-bottom: 1.25rem; }

  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  @media (max-width: 520px) { .options { grid-template-columns: 1fr; } }

  .opt-btn {
    padding: 11px 14px; font-size: 14px; font-family: var(--font-main);
    border: 1px solid #ddd; border-radius: var(--radius-md);
    background: #fafaf8; color: #1a1a18; cursor: pointer;
    text-align: left; line-height: 1.4; transition: background 0.12s, border-color 0.12s;
    font-weight: 400;
  }
  .opt-btn:hover:not(:disabled) { background: var(--gray-50); border-color: #bbb; }
  .opt-btn.correct { background: var(--green-50); border-color: var(--green-600); color: var(--green-800); font-weight: 500; }
  .opt-btn.wrong { background: var(--red-50); border-color: var(--red-600); color: var(--red-800); }
  .opt-btn:disabled { cursor: default; }

  /* ── Rationale ── */
  .rationale {
    padding: 14px 16px; border-radius: var(--radius-md);
    font-size: 14px; line-height: 1.6; margin-bottom: 1rem;
  }
  .rationale.correct { background: var(--green-50); border: 1px solid #9CCF6B; color: var(--green-800); }
  .rationale.wrong { background: var(--red-50); border: 1px solid #F7C1C1; color: var(--red-800); }
  .rationale strong { font-weight: 600; }

  /* ── Buzz panel ── */
  .buzz-area { text-align: center; padding: 1rem 0 0.5rem; }
  .buzz-prompt { font-size: 14px; color: var(--gray-600); margin-bottom: 12px; }
  .buzz-buttons { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .buzzer-name { font-family: var(--font-display); font-size: 24px; color: var(--blue-600); margin-bottom: 4px; }

  /* ── Q Actions ── */
  .q-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 4px; }
  .q-counter { font-size: 13px; color: var(--gray-400); margin-left: auto; }

  /* ── Final Screen ── */
  .podium { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin: 1.5rem 0; }
  .podium-card { text-align: center; padding: 20px 10px; border-radius: var(--radius-lg); border: 1px solid transparent; }
  .podium-card.p1 { background: var(--amber-50); border-color: #EF9F27; }
  .podium-card.p2 { background: var(--blue-50); border-color: var(--blue-200); }
  .podium-card.p3 { background: var(--teal-50); border-color: #5DCAA5; }
  .podium-card.prest { background: var(--gray-50); border-color: var(--gray-100); }
  .podium-rank { font-size: 26px; margin-bottom: 6px; }
  .podium-name { font-size: 15px; font-weight: 600; color: #1a1a18; }
  .podium-pts { font-family: var(--font-display); font-size: 28px; color: var(--gray-600); margin-top: 4px; }

  .divider { border: none; border-top: 1px solid #e0ddd5; margin: 1.5rem 0; }
  .flex-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .spacer { flex: 1; }
</style>
</head>
<body>
<div class="app">

<!-- ══════════════════ SETUP SCREEN ══════════════════ -->
<div id="screen-setup" class="screen active">
  <div class="game-header">
    <h1>Rapid Response</h1>
    <p>Postpartum &amp; Newborn Care — Clinical Scenario Game</p>
  </div>

  <div class="card">
    <div class="card-title">Teams</div>
    <div id="team-inputs"></div>
    <div class="flex-row" style="margin-top:8px">
      <button class="btn btn-sm" onclick="addTeam()">+ Add team</button>
      <button class="btn btn-sm" onclick="removeTeam()">− Remove team</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Categories</div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <div class="card">
    <div class="card-title">Game Mode</div>
    <div id="mode-options"></div>
  </div>

  <div class="card">
    <div class="card-title">Questions</div>
    <div class="flex-row">
      <div class="q-num-wrap">
        <span style="font-size:14px;color:var(--gray-600)">Number of questions:</span>
        <input type="number" id="q-count" value="15" min="5" max="30">
      </div>
      <label class="shuffle-label" style="margin-left:8px">
        <input type="checkbox" id="shuffle-on" checked> Shuffle
      </label>
    </div>
    <div style="margin-top:10px;font-size:12px;color:var(--gray-400)">
      Points: Foundational = 1 &nbsp;|&nbsp; Priority = 2 &nbsp;|&nbsp; Challenge = 3<br>
      Buzz-in wrong answer = −1 point
    </div>
  </div>

  <button class="btn btn-primary btn-lg" onclick="startGame()">Start Game →</button>
</div>

<!-- ══════════════════ GAME SCREEN ══════════════════ -->
<div id="screen-game" class="screen">
  <div class="flex-row" style="margin-bottom:1.25rem">
    <h1 style="font-family:var(--font-display);font-size:1.6rem;font-weight:400">Rapid Response</h1>
    <span class="spacer"></span>
    <span id="q-counter" style="font-size:13px;color:var(--gray-400)"></span>
  </div>

  <div class="scoreboard" id="scoreboard"></div>
  <div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>

  <div class="card" id="question-card">
    <div class="q-meta" id="q-meta"></div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
    <div id="rationale-box" style="display:none"></div>
    <div id="buzz-box" style="display:none"></div>
    <div class="q-actions" id="q-actions"></div>
  </div>

  <div style="margin-top:0.5rem">
    <button class="btn btn-sm btn-ghost" onclick="endGame()">⏹ End game &amp; see scores</button>
  </div>
</div>

<!-- ══════════════════ FINAL SCREEN ══════════════════ -->
<div id="screen-final" class="screen">
  <div class="game-header">
    <h1>Final Scores</h1>
    <p>Great work, everyone! Here's how it shook out.</p>
  </div>
  <div class="podium" id="podium"></div>
  <hr class="divider">
  <div class="flex-row">
    <button class="btn btn-primary" onclick="playAgain()">Play again (same teams)</button>
    <button class="btn" onclick="showScreen('screen-setup')">New game setup</button>
  </div>
</div>

</div><!-- /app -->

<script>
const ALL_Q = [
  {cat:"Postpartum Assessment",diff:"essential",q:"A patient is 6 hours postpartum. Her fundus is firm, midline, at the umbilicus, and she has moderate lochia rubra. Which finding is concerning and requires immediate intervention?",opts:["Fundus at the umbilicus","Lochia rubra","HR 58 bpm","Bladder distension with fundus shifted right"],ans:3,r:"A fundus displaced to the right of midline indicates bladder distension. A full bladder prevents uterine contraction and is a leading cause of early postpartum hemorrhage. The nurse should assist the patient to void immediately."},
  {cat:"Postpartum Assessment",diff:"essential",q:"When assessing lochia on a postpartum patient day 3, you note lochia serosa with a foul odor and the patient has a temperature of 101.5°F. What is the priority nursing action?",opts:["Document as expected transition","Encourage increased fluid intake","Notify the provider","Apply warm compresses to the fundus"],ans:2,r:"Foul-smelling lochia combined with fever are hallmark signs of endometritis (uterine infection). This is a postpartum emergency requiring provider notification and likely antibiotic therapy."},
  {cat:"Postpartum Assessment",diff:"essential",q:"A postpartum patient reports pain rated 8/10 at the perineum. On inspection, the area lateral to the repair is tense, ecchymotic, and the patient cannot void. What do you suspect?",opts:["Normal postoperative edema","Hematoma formation","Wound dehiscence","Perineal laceration grade II"],ans:1,r:"A hematoma forms when bleeding occurs into soft tissue without external hemorrhage. Key signs are tense, painful, discolored swelling at the perineum. Inability to void may result from pressure. Notify the provider immediately."},
  {cat:"Postpartum Assessment",diff:"essential",q:"A patient is day 2 postpartum and has chosen not to breastfeed. She reports bilateral breast pain rated 6/10, and her breasts are firm, warm, and engorged. Which nursing intervention is most appropriate?",opts:["Encourage pumping to relieve pressure","Apply warm compresses and massage the breasts","Apply ice packs, wear a supportive bra, and avoid breast stimulation","Administer bromocriptine to suppress lactation"],ans:2,r:"For non-breastfeeding patients, the goal is lactation suppression. Ice packs reduce discomfort and swelling, a supportive bra provides comfort and reduces stimulation, and avoiding any breast stimulation (pumping, warm compresses, massage) prevents further milk production. Bromocriptine was previously used for lactation suppression but is no longer recommended due to serious side effects including stroke and MI."},
  {cat:"Postpartum Complications",diff:"challenge",q:"A patient presents to the OB clinic 5 days after discharge following an uncomplicated vaginal delivery. She reports a severe headache, visual 'floaters,' and facial swelling that started this morning. Her BP is 158/104. Which is the priority nursing action?",opts:["Reassure her that postpartum swelling and headaches are common and schedule a follow-up in one week","Obtain a urine sample for protein, administer antihypertensive per protocol, and notify the provider immediately","Administer ibuprofen for the headache and recheck BP in 30 minutes","Instruct the patient to go home, rest, and monitor her BP with a home cuff"],ans:1,r:"Postpartum preeclampsia can develop up to 6 weeks after delivery, even in patients with no hypertension during pregnancy or prior to discharge. A BP of 158/104 with severe headache, visual disturbances, and facial edema meets criteria for preeclampsia with severe features. Priority actions are urinalysis for proteinuria, antihypertensive administration per protocol, and immediate provider notification. Sending this patient home would be dangerous — postpartum preeclampsia carries risk of seizure (eclampsia) and stroke."},
  {cat:"Postpartum Hemorrhage",diff:"priority",q:"A patient is 3 hours post vaginal delivery with a repaired laceration. The nurse has been monitoring her closely for hemorrhage. Which finding would the nurse identify as the best indicator that the patient's condition is stabilizing?",opts:["The patient reports feeling less anxious and requests to have visitors in the room","Fundus remains firm, lochia has decreased to moderate, and vital signs are trending toward baseline","The patient's pain is controlled with oral analgesics","Urine output is 25 mL over the last hour and skin is warm and dry"],ans:1,r:"Evaluation of hemorrhage stabilization requires objective clinical indicators. A firm fundus confirms uterine tone is maintained, decreasing lochia indicates reduced bleeding, and vital signs trending toward baseline confirm hemodynamic recovery. Subjective findings such as reduced anxiety do not confirm hemorrhage resolution. Pain control alone does not indicate hemorrhage stabilization. Urine output of 25 mL/hr remains below the acceptable threshold of 30 mL/hr and would indicate inadequate perfusion rather than stabilization."},
  {cat:"Postpartum Hemorrhage",diff:"priority",q:"A patient is 1 hour postpartum. Fundus is boggy at +1 above the umbilicus and lochia is heavy with clots. After vigorous fundal massage, the uterus remains boggy. What is the next priority intervention?",opts:["Continue massaging every 15 minutes","Administer oxytocin per protocol","Encourage breastfeeding only","Administer misoprostol sublingually per protocol"],ans:1,r:"When massage alone does not restore uterine tone, uterotonic medications — starting with oxytocin — are the next step. This addresses the underlying atony causing hemorrhage."},
  {cat:"Postpartum Hemorrhage",diff:"priority",q:"Estimated blood loss has reached 1,000 mL in a vaginal delivery patient. She is tachycardic and her BP has dropped to 88/52. Which action takes priority?",opts:["Recheck fundal tone and continue uterine massage","Insert two large-bore IVs and begin fluid resuscitation per protocol","Increase the oxytocin infusion rate and reassess in 15 minutes","Place the patient in Trendelenburg position and apply oxygen"],ans:1,r:"This patient is in hypovolemic shock. Immediate large-bore IV access and fluid resuscitation are the priority to restore perfusion. Other interventions (uterotonic agents, calling provider) happen simultaneously but vascular access is the critical first step."},
  {cat:"Postpartum Hemorrhage",diff:"priority",q:"Oxytocin has failed to control uterine atony following vaginal delivery. Which medication is the appropriate second-line uterotonic, and is CONTRAINDICATED in patients with hypertension?",opts:["Administer misoprostol sublingually per protocol","Administer methylergonovine 0.2 mg IM per protocol","Administer carboprost 250 mcg IM per protocol","Administer tranexamic acid IV per protocol"],ans:1,r:"Methylergonovine is a second-line uterotonic that causes vasoconstriction and is contraindicated in hypertensive patients due to risk of hypertensive crisis. Misoprostol is often used as an alternative. Carboprost is third-line and contraindicated in asthma. Always assess blood pressure before administering methylergonovine."},
  {cat:"Postpartum Hemorrhage",diff:"priority",q:"Which medication is a second-line uterotonic used for postpartum hemorrhage when oxytocin fails, but is CONTRAINDICATED in patients with hypertension?",opts:["Misoprostol","Methylergonovine","Carboprost","Tranexamic acid"],ans:1,r:"Methylergonovine causes vasoconstriction and is contraindicated in hypertensive patients. Misoprostol is often used instead. Carboprost is contraindicated in asthma. Knowing contraindications is essential for safe medication administration."},
  {cat:"Postpartum Mental Health",diff:"essential",q:"A patient at her 2-week postpartum visit tearfully says she hasn't slept in days, feels like a terrible mother, and has had fleeting thoughts of harming herself but 'would never act on it.' What is the priority response?",opts:["Reassure her that baby blues are normal","Document and schedule follow-up in 2 weeks","Perform a full depression screening and ensure same-day mental health evaluation","Recommend a support group and call in 30 days"],ans:2,r:"Active suicidal ideation, even 'passive' thoughts, requires same-day evaluation. Postpartum depression with suicidal ideation is a psychiatric emergency. The Edinburgh Postnatal Depression Scale can be used, but the immediate priority is a mental health evaluation."},
  {cat:"Postpartum Mental Health",diff:"essential",q:"Which of the following best distinguishes postpartum blues from postpartum depression?",opts:["Postpartum blues occurs after day 16 and requires medication","PPD persists beyond 2 weeks with functional impairment","Both require antidepressant therapy","Postpartum blues includes hallucinations"],ans:1,r:"Postpartum blues is a transient emotional response in the first 1–2 weeks, resolving on its own. PPD persists beyond 2 weeks and causes functional impairment. Postpartum psychosis — which may include hallucinations — is a separate, more severe condition."},
  {cat:"Postpartum Mental Health",diff:"challenge",q:"A new mother reports she has not slept in 4 days, is hearing a voice telling her the baby is 'marked by evil,' and has been hiding sharp objects. What is the immediate action?",opts:["Begin an SSRI and schedule follow-up in one week","Reassure the patient and schedule outpatient follow-up","Do not leave her alone and initiate an immediate psychiatric emergency consult","Refer to outpatient therapy and notify the outpatient provider"],ans:2,r:"Postpartum psychosis is a psychiatric emergency. Hallucinations, command voices, and concealing weapons indicate risk of harm to self or infant. The patient must NOT be left alone. Call for immediate psychiatric intervention. This is a rare but life-threatening condition."},
  {cat:"Newborn Assessment",diff:"essential",q:"A term newborn at 36 hours of life has a total bilirubin of 14 mg/dL. The infant is breastfeeding poorly and has lost 9% of birth weight. What is the priority action?",opts:["Reassure parents that jaundice is normal","Supplement with formula to increase caloric intake and monitor bilirubin","Begin phototherapy and assess feeding","Discharge with follow-up in 2 weeks"],ans:2,r:"Bilirubin of 14 mg/dL at 36 hours with poor feeding and excessive weight loss indicates pathological jaundice risk. Phototherapy should be initiated based on the AAP nomogram, and feeding must be optimized."},
  {cat:"Newborn Assessment",diff:"essential",q:"When assessing a newborn's fontanelles, the nurse notes a bulging anterior fontanelle. The newborn is 12 hours old and afebrile. What is the most appropriate action?",opts:["Reassure the parents that fontanelles normally close by 18 months of age","Notify the provider immediately as this may indicate increased intracranial pressure","Document the finding as expected since the fontanelle bulges when the infant is dehydrated","Reassure the parents that this is a normal finding consistent with caput succedaneum"],ans:1,r:"A bulging anterior fontanelle indicates increased intracranial pressure and is always abnormal. It may signal intracranial hemorrhage, meningitis, or hydrocephalus. This requires immediate provider notification. A sunken fontanelle indicates dehydration."},
  {cat:"Newborn Assessment",diff:"challenge",q:"A newborn has a blood glucose of 38 mg/dL at 30 minutes of life and is jittery with a weak cry. What is the immediate nursing action?",opts:["Recheck glucose in 1 hour","Encourage breastfeeding and recheck in 30 minutes","Provide early feeding (breast or formula) and notify the provider","Administer IV dextrose immediately without attempting oral feeding"],ans:2,r:"For a symptomatic hypoglycemic newborn, early enteral feeding is attempted first if the infant can swallow safely. The provider must be notified. IV dextrose is reserved for infants who cannot feed, are severely symptomatic, or do not respond to oral feeding."},
  {cat:"Newborn Assessment",diff:"essential",q:"Which newborn vital sign finding requires immediate provider notification?",opts:["Respiratory rate 44 breaths/min","Axillary temperature 98.6°F","Heart rate 90 bpm at rest","Systolic BP 65 mmHg"],ans:2,r:"Normal newborn HR is 120–160 bpm at rest. A resting HR of 90 bpm is bradycardia and requires immediate assessment and provider notification. It may indicate cardiac, metabolic, or sepsis-related etiology."},
  {cat:"Newborn Assessment",diff:"priority",q:"A 2-day-old newborn has a cephalohematoma. The parents ask about the lump on the baby's head. What should the nurse explain?",opts:["This is a collection of fluid under the scalp that crosses the suture lines and will resolve within a few days","This is a collection of blood between the skull and the periosteum that does not cross suture lines and will resolve on its own over several weeks to months","This is a collection of blood beneath the scalp that crosses the suture lines and requires monitoring for anemia","This is a normal soft tissue swelling from delivery that crosses the suture lines and typically resolves within 72 hours"],ans:1,r:"Cephalohematoma is a subperiosteal blood collection that does NOT cross suture lines. It resolves spontaneously over weeks to months. Caput succedaneum — which DOES cross suture lines — resolves faster."},
  {cat:"Newborn Care",diff:"essential",q:"A breastfeeding mother asks how she will know if her newborn is getting enough milk. Which response is most accurate?",opts:["'Weigh the baby daily at home.'","'Count at least 6 wet diapers and 3–4 stools per day by day 4.'","'Your baby should sleep 5–6 hours between feedings.'","'If the baby seems satisfied after 10 minutes, supply is adequate.'"],ans:1,r:"Diaper output is the most reliable home indicator of adequate intake. By day 4, infants should have ≥6 wet diapers and multiple stools per day, indicating sufficient hydration and caloric intake."},
  {cat:"Newborn Care",diff:"essential",q:"Which statement about safe sleep guidelines is INCORRECT and must be corrected?",opts:["'Place baby on their back for every sleep.'","'A firm, flat sleep surface is safest.'","'Co-sleeping in the parents' bed reduces SIDS risk if parents are non-smokers.'","'Avoid loose bedding, pillows, and soft toys in the sleep space.'"],ans:2,r:"Co-sleeping in an adult bed is NOT recommended by the AAP regardless of parental smoking status — it increases the risk of suffocation and SIDS. The ABCs of safe sleep are: Alone, on their Back, in a Crib with no loose items."},
  {cat:"Newborn Care",diff:"essential",q:"A mother is preparing to bathe her newborn for the first time. Which teaching point is the highest priority?",opts:["Use warm water and mild soap on the entire body","Never leave the infant unattended in or near water","Tub baths are preferred over sponge baths in the first week","Use baby powder to keep the skin dry"],ans:1,r:"Drowning can occur in as little as 1–2 inches of water in seconds. Never leaving a newborn unattended during bathing is the highest safety priority. Until the cord falls off, sponge baths are recommended. Baby powder is no longer recommended due to aspiration risk."},
  {cat:"Newborn Care",diff:"priority",q:"A 3-hour-old newborn has RR 72, nasal flaring, intercostal retractions, and audible grunting. Temp 98.4°F, HR 158. What is the nurse's priority action?",opts:["Recheck vitals in 30 minutes","Initiate skin-to-skin contact to warm the newborn","Notify the provider immediately and prepare for NICU transfer","Suction the oropharynx and resume routine monitoring"],ans:2,r:"Tachypnea >60, nasal flaring, retractions, and grunting are signs of respiratory distress. Grunting is particularly ominous — it is the newborn's compensatory mechanism to maintain end-expiratory lung volume. Immediate provider notification and likely NICU transfer are required."},
  {cat:"Maternal-Newborn Pharmacology",diff:"priority",q:"A postpartum patient on mag sulfate for pre-eclampsia has RR 10, absent DTRs, and urine output 20 mL/hr. What is the priority action?",opts:["Increase IV fluid rate","Administer calcium gluconate IV","Hold oxytocin infusion","Prepare for blood transfusion"],ans:1,r:"These findings (respiratory depression, absent DTRs, oliguria) are classic signs of magnesium toxicity. Calcium gluconate is the antidote and must be administered immediately. Magnesium is renally cleared — oliguria allows accumulation to toxic levels."},
  {cat:"Maternal-Newborn Pharmacology",diff:"priority",q:"Which assessment is MOST important before administering methylergonovine to a postpartum patient?",opts:["Lochia amount","Blood pressure","Temperature","Fundal height"],ans:1,r:"Methylergonovine causes vasospasm and can precipitate hypertensive crisis. Blood pressure must be assessed before every dose. It is absolutely contraindicated in patients with hypertension (BP ≥140/90)."},
  {cat:"Maternal-Newborn Pharmacology",diff:"challenge",q:"A newborn born to a mother who received methadone maintenance therapy throughout pregnancy is now 24 hours old. The nurse notes the infant is extremely irritable, has a high-pitched cry, is sneezing frequently, and has a poor feeding pattern. What does the nurse recognize about this presentation and what is the priority action?",opts:["These are expected findings in all newborns — continue routine monitoring and reassure the parents","These findings are consistent with neonatal abstinence syndrome — initiate NAS scoring, notify the provider, and implement non-pharmacologic comfort measures","This infant is showing signs of sepsis — obtain blood cultures and prepare for antibiotic administration","These findings suggest hypoglycemia — check blood glucose and initiate early feeding immediately"],ans:1,r:"Neonatal abstinence syndrome (NAS) occurs when an infant exposed to opioids or other substances in utero experiences withdrawal after birth. Classic signs include high-pitched cry, irritability, poor feeding, sneezing, and tremors. Priority actions are initiating a validated NAS scoring tool, notifying the provider, and beginning non-pharmacologic comfort measures such as swaddling, low stimulation environment, and frequent small feedings. Pharmacologic treatment is initiated based on NAS scores."},
  {cat:"Maternal-Newborn Pharmacology",diff:"challenge",q:"A newborn delivered 20 minutes ago to a mother who received IV morphine 45 minutes before delivery is now limp, apneic, and blue despite stimulation. Ventilation with bag-mask is initiated. Which medication should the nurse anticipate administering?",opts:["Epinephrine IV to stimulate cardiac output","Naloxone IM or IV to reverse opioid-induced respiratory depression","Calcium gluconate IV to treat neonatal hypocalcemia","Dextrose IV to treat neonatal hypoglycemia"],ans:1,r:"Maternal opioid administration within 4 hours of delivery can cause neonatal respiratory depression. Naloxone is an opioid antagonist that rapidly reverses opioid-induced respiratory depression in the newborn. Bag-mask ventilation takes priority while naloxone is prepared. Naloxone should be used with caution in infants of opioid-dependent mothers as it can precipitate acute withdrawal and seizures."},
  {cat:"Postpartum Complications",diff:"challenge",q:"A patient is day 5 post-C-section with sudden right calf pain, warmth, redness, and now shortness of breath and pleuritic chest pain. What is the priority action?",opts:["Encourage ambulation to reduce DVT risk","Apply warm compress to the leg","Obtain vital signs and notify provider immediately","Obtain an echocardiogram"],ans:2,r:"Sudden onset pleuritic chest pain and shortness of breath in a postpartum patient with signs of DVT is a pulmonary embolism until proven otherwise. This is life-threatening. Immediate provider notification, vital signs, oxygen, and IV access are priorities. Do NOT massage the leg."},
  {cat:"Postpartum Complications",diff:"challenge",q:"A patient presents to the OB clinic 7 days post-cesarean reporting she felt a 'pop' at her incision earlier that morning. On assessment, the nurse notes a dehisced section of the incision with a loop of bowel visible. The patient is alert and her BP is 118/74. What is the priority nursing action?",opts:["Apply an abdominal binder and transport the patient to the emergency department","Cover the bowel with a sterile saline-moistened dressing, do not attempt to reinsert, and call 911 immediately","Irrigate the wound with normal saline, apply a dry sterile dressing, and notify the surgeon","Place the patient supine, apply direct pressure to the wound, and instruct her to cough and deep breathe"],ans:1,r:"Evisceration is a surgical emergency. The priority is to keep the exposed bowel moist and protected using a sterile saline-moistened dressing — a dry dressing can cause bowel necrosis. The bowel must never be reinserted by the nurse. Because this occurs in a clinic setting, 911 should be called immediately for emergency transport. The patient should be kept calm and still to prevent further evisceration."},
  {cat:"Postpartum Complications",diff:"challenge",q:"A patient reports a sudden, severe headache 2 hours after epidural removal, day 1 postpartum. No photophobia or fever. What is the most likely cause?",opts:["Preeclampsia with severe features","Post-dural puncture headache","Subarachnoid hemorrhage","Migraine"],ans:1,r:"A positional headache after neuraxial anesthesia suggests post-dural puncture headache from CSF leak. However, a thunderclap headache must first rule out subarachnoid hemorrhage. Absence of fever and photophobia helps differentiate from meningitis. Anesthesia team should evaluate."},
  {cat:"Newborn Assessment",diff:"priority",q:"During a routine assessment of a 24-hour-old newborn, the nurse auscultates a loud harsh murmur at the left sternal border. The infant has an oxygen saturation of 91% on room air and is dusky around the lips. What is the priority nursing action?",opts:["Document the finding and recheck the oxygen saturation at the next scheduled assessment","Notify the provider immediately, apply supplemental oxygen, and prepare for further cardiac evaluation","Reassure the parents that murmurs are common in newborns and typically resolve on their own","Reposition the infant and recheck oxygen saturation in 30 minutes before notifying the provider"],ans:1,r:"A loud harsh murmur combined with oxygen saturation of 91% and central cyanosis (duskiness around the lips) are signs of a potentially serious congenital cardiac defect requiring immediate intervention. Central cyanosis is never a normal finding and indicates inadequate oxygenation. The provider must be notified immediately, supplemental oxygen applied, and the infant prepared for echocardiogram and further evaluation. Delaying notification is unsafe."}
];

const CATS = [...new Set(ALL_Q.map(q=>q.cat))];
const DIFF_LABEL = {essential:'Foundational',priority:'Priority',challenge:'Challenge'};
const DIFF_BADGE = {essential:'badge-teal',priority:'badge-amber',challenge:'badge-coral'};

let teams=[], gameMode='buzzer', selectedCats=new Set(CATS);
let questions=[], currentQ=0, answered=false, buzzedTeam=-1;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function init(){
  const ti=document.getElementById('team-inputs');
  ti.innerHTML='';
  ['Team Nightingale','Team Barton','Team Wald'].forEach(n=>addTeamRow(n));

  const cg=document.getElementById('cat-grid');
  cg.innerHTML='';
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-tag on'; b.textContent=c; b.dataset.cat=c;
    b.onclick=()=>toggleCat(c,b);
    cg.appendChild(b);
  });

  const mo=document.getElementById('mode-options');
  mo.innerHTML=`
    <div class="mode-option selected" onclick="selectMode('buzzer',this)">
      <input type="radio" name="mode" value="buzzer" checked>
      <div><div class="mode-title">Buzz-in</div><div class="mode-desc">Teams compete per question. First to buzz in answers. Wrong = −1 pt.</div></div>
    </div>
    <div class="mode-option" onclick="selectMode('team',this)">
      <input type="radio" name="mode" value="team">
      <div><div class="mode-title">Team rotation</div><div class="mode-desc">Each team takes turns answering. Great for collaborative review.</div></div>
    </div>`;
}

function selectMode(val,el){
  gameMode=val;
  document.querySelectorAll('.mode-option').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('input').checked=true;
}

function addTeamRow(name=''){
  const ti=document.getElementById('team-inputs');
  if(ti.children.length>=5) return;
  const d=document.createElement('div');
  d.className='team-row';
  d.innerHTML=`<span class="team-num">Team ${ti.children.length+1}</span><input type="text" value="${name}" placeholder="Team name">`;
  ti.appendChild(d);
}
function addTeam(){addTeamRow('');}
function removeTeam(){const ti=document.getElementById('team-inputs');if(ti.children.length>2)ti.removeChild(ti.lastChild);}

function toggleCat(cat,btn){
  if(selectedCats.has(cat)){
    if(selectedCats.size<=1) return;
    selectedCats.delete(cat); btn.className='cat-tag off';
  } else {
    selectedCats.add(cat); btn.className='cat-tag on';
  }
}

function startGame(){
  const inputs=document.querySelectorAll('#team-inputs input');
  teams=Array.from(inputs).map((el,i)=>({name:el.value.trim()||`Team ${i+1}`,score:0}));
  gameMode=document.querySelector('.mode-option.selected input').value;
  let pool=ALL_Q.filter(q=>selectedCats.has(q.cat));
  if(document.getElementById('shuffle-on').checked) pool=pool.sort(()=>Math.random()-0.5);
  const count=Math.min(parseInt(document.getElementById('q-count').value)||15,pool.length);
  questions=pool.slice(0,count);
  currentQ=0;
  showScreen('screen-game');
  renderQ();
}

function currentTeamIdx(){return gameMode==='team'?currentQ%teams.length:-1;}

function renderScoreboard(highlight=-1, flash=''){
  const sb=document.getElementById('scoreboard');
  sb.innerHTML=teams.map((t,i)=>`
    <div class="team-tile ${i===highlight?(flash||'buzzing'):''}">
      <div class="tile-name">${t.name}</div>
      <div class="tile-score">${t.score}</div>
      ${gameMode==='team'&&i===currentTeamIdx()&&!answered?'<div class="tile-turn">their turn</div>':''}
    </div>`).join('');
}

function renderQ(){
  if(currentQ>=questions.length){showFinal();return;}
  answered=false; buzzedTeam=-1;
  const q=questions[currentQ];
  const pct=Math.round((currentQ/questions.length)*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('q-counter').textContent=`Question ${currentQ+1} of ${questions.length}`;

  const pts=q.diff==='challenge'?3:q.diff==='priority'?2:1;
  document.getElementById('q-meta').innerHTML=`
    <span class="badge ${DIFF_BADGE[q.diff]}">${DIFF_LABEL[q.diff]}</span>
    <span class="badge badge-purple">${q.cat}</span>
    <span class="badge badge-blue">${pts} pt${pts>1?'s':''}</span>`;

  document.getElementById('q-text').textContent=q.q;
  document.getElementById('rationale-box').style.display='none';
  document.getElementById('q-actions').innerHTML='';

  const opts=document.getElementById('options');
  const buzz=document.getElementById('buzz-box');

  if(gameMode==='buzzer'){
    opts.innerHTML='';
    buzz.style.display='block';
    buzz.innerHTML=`<div class="buzz-area">
      <div class="buzz-prompt">Which team buzzes in first?</div>
      <div class="buzz-buttons">${teams.map((t,i)=>`<button class="btn btn-primary" onclick="teamBuzz(${i})">${t.name}</button>`).join('')}</div>
    </div>`;
    renderScoreboard();
  } else {
    buzz.style.display='none';
    opts.innerHTML=q.opts.map((o,i)=>`<button class="opt-btn" onclick="selectOpt(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('');
    renderScoreboard(currentTeamIdx());
  }
}

function teamBuzz(idx){
  buzzedTeam=idx;
  const q=questions[currentQ];
  const buzz=document.getElementById('buzz-box');
  buzz.innerHTML=`<div class="buzz-area">
    <div class="buzzer-name">${teams[idx].name} buzzed in!</div>
    <div class="buzz-prompt" style="margin-bottom:10px">Select their answer:</div>
    <div class="options" style="max-width:520px;margin:0 auto">${q.opts.map((o,i)=>`<button class="opt-btn" onclick="selectOpt(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join('')}</div>
  </div>`;
  renderScoreboard(idx);
}

function selectOpt(idx){
  if(answered) return;
  answered=true;
  const q=questions[currentQ];
  const correct=idx===q.ans;
  const teamIdx=gameMode==='team'?currentTeamIdx():buzzedTeam;
  const pts=q.diff==='challenge'?3:q.diff==='priority'?2:1;

  if(correct&&teamIdx>=0) teams[teamIdx].score+=pts;
  else if(!correct&&gameMode==='buzzer'&&buzzedTeam>=0) teams[buzzedTeam].score=Math.max(0,teams[buzzedTeam].score-1);

  document.getElementById('buzz-box').style.display='none';

  const opts=document.getElementById('options');
  opts.innerHTML=q.opts.map((o,i)=>`<button class="opt-btn ${i===q.ans?'correct':i===idx&&!correct?'wrong':''}" disabled>${String.fromCharCode(65+i)}. ${o}</button>`).join('');

  const rb=document.getElementById('rationale-box');
  rb.style.display='block';
  rb.className='rationale '+(correct?'correct':'wrong');
  const teamName=teamIdx>=0?teams[teamIdx].name:'';
  rb.innerHTML=`<strong>${correct?'Correct!':'Incorrect.'}</strong>${teamIdx>=0?(correct?` +${pts} for ${teamName}.`:` −1 for ${teamName}.`):''}<br><br><strong>Rationale:</strong> ${q.r}`;

  renderScoreboard(teamIdx, correct?'correct-flash':'wrong-flash');

  document.getElementById('q-actions').innerHTML=`<button class="btn btn-primary" onclick="nextQ()">${currentQ+1<questions.length?'Next question →':'See final scores →'}</button>`;
}

function nextQ(){currentQ++;renderQ();}

function endGame(){if(confirm('End the current game and see scores?')) showFinal();}

function showFinal(){
  showScreen('screen-final');
  const sorted=[...teams].sort((a,b)=>b.score-a.score);
  const classes=['p1','p2','p3'];
  const icons=['🥇','🥈','🥉'];
  document.getElementById('podium').innerHTML=sorted.map((t,i)=>`
    <div class="podium-card ${classes[i]||'prest'}">
      <div class="podium-rank">${icons[i]||''}</div>
      <div class="podium-name">${t.name}</div>
      <div class="podium-pts">${t.score} pts</div>
    </div>`).join('');
}

function playAgain(){
  teams.forEach(t=>t.score=0);
  currentQ=0;
  questions=questions.sort(()=>Math.random()-0.5);
  showScreen('screen-game');
  renderQ();
}

init();
</script>
</body>
</html>
